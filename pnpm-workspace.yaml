allowBuilds:
  "@sentry/cli": true
  contentlayer: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
allowedDeprecatedVersions:
  node-domexception: "*"
overrides:
  esbuild: "0.25.12"
  estree-util-value-to-estree@<3.3.3: ">=3.3.3"
  tmp@<0.2.6: ">=0.2.6"
  postcss@<8.5.10: ">=8.5.10"
  uuid@<11.1.1: "11.1.1"
packageExtensions:
  next-contentlayer@*:
    peerDependencies:
      next: ^16.0.0
  "@opentelemetry/core@1.13.0":
    peerDependencies:
      "@opentelemetry/api": ">=1.0.0 <2.0.0"
  "@opentelemetry/resources@1.13.0":
    peerDependencies:
      "@opentelemetry/api": ">=1.0.0 <2.0.0"
  "@opentelemetry/sdk-trace-base@1.13.0":
    peerDependencies:
      "@opentelemetry/api": ">=1.0.0 <2.0.0"
  "@opentelemetry/otlp-transformer@0.39.1":
    peerDependencies:
      "@opentelemetry/api": ">=1.0.0 <2.0.0"
  "@opentelemetry/sdk-logs@0.39.1":
    peerDependencies:
      "@opentelemetry/api": ">=1.0.0 <2.0.0"
  "@opentelemetry/sdk-metrics@1.13.0":
    peerDependencies:
      "@opentelemetry/api": ">=1.0.0 <2.0.0"
peerDependencyRules:
  allowedVersions:
    "@opentelemetry/api": ">=1.0.0 <2.0.0"
    next: ^16.0.0
  ignoreMissing:
    - "@opentelemetry/api@>1.5.0"
    - next@>13
